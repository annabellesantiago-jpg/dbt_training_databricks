models:
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_date
        tests:
          - not_null        
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - returned
                  - completed
                  - return_pending
                  - shipped
                  - placed
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id