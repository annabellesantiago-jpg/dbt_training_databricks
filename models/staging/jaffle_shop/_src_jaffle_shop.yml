sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        config:
          freshness: null
        columns:
          - name: id 
            description: primary key
            data_tests:
              - unique
              - not_null
              
      - name: orders
        columns:
          - name: id 
            description: primary key
            data_tests:
              - unique
              - not_null      
        config:
          # loaded_at_field: _etl_loaded_at
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 6
              period: day
          

            