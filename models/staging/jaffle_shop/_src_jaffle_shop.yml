sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: this is a copy of Postgres database
    tables:
      - name: customers
        description: contains raw data for customers. grain for this is one unique customer per row
        config:
          freshness: null
        columns:
          - name: id 
            description: primary key
            data_tests:
              - unique
              - not_null
              
      - name: orders
        description: contains raw data for orders. grain for this is one unique order per row
        columns:
          - name: id 
            description: primary key
            data_tests:
              - unique
              - not_null      
        config:
          # loaded_at_field: _etl_loaded_at
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 6
              period: day
          

            